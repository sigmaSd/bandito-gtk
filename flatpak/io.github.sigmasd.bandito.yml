app-id: io.github.sigmasd.bandito

runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: bandito-gtk

finish-args:
  # Display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  # Network (needed for Deno.networkInterfaces and backends)
  - --share=network
  # D-Bus (needed for GApplication registration)
  - --socket=session-bus
  # Allow spawning commands on host (for pkexec)
  - --talk-name=org.freedesktop.Flatpak

modules:
  # ─── Module 1: eltrafico-tc (Rust) ──────────────────────────
  - name: eltrafico-tc
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/eltrafico-tc/cargo
        CARGO_NET_OFFLINE: 'true'
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo build --offline --release
      - install -Dm755 target/release/eltrafico-tc /app/bin/eltrafico-tc
    sources:
      - type: git
        url: https://github.com/sigmaSd/Eltrafico
        tag: 2.3.10
      - eltrafico-sources.json

  # ─── Module 2: bandwhich (Rust) ─────────────────────────────
  - name: bandwhich
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/bandwhich/cargo
        CARGO_NET_OFFLINE: 'true'
    build-commands:
      - cargo build --offline --release
      - install -Dm755 target/release/bandwhich /app/bin/bandwhich
    sources:
      - type: git
        url: https://github.com/imsnif/bandwhich
        tag: v0.23.1
      - bandwhich-sources.json

  # ─── Module 3: bandito-gtk (the app itself) ────────────────
  - name: bandito-gtk
    buildsystem: simple
    build-commands:
      - mkdir -p /app/share/applications

      # Compile the Deno app
      - DENORT_BIN=$PWD/denort ./deno compile --no-check --output bandito-gtk --vendor --cached-only -A --unstable-raw-imports ./src/main.ts
      - mv bandito-gtk /app/bin/bandito-gtk

      # Install desktop file
      - |
          cat > /app/share/applications/io.github.sigmasd.bandito.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Bandito GTK
          Comment=Network bandwidth monitor and traffic shaper
          Exec=bandito-gtk
          Icon=io.github.sigmasd.bandito
          Categories=System;Network;Settings;
          StartupNotify=true
          EOF

      # Install icon
      - mkdir -p /app/share/icons/hicolor/scalable/apps/
      - |
          cat > /app/share/icons/hicolor/scalable/apps/io.github.sigmasd.bandito.svg << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
            <rect width="128" height="128" fill="#33d17a" rx="16"/>
            <text x="64" y="88" text-anchor="middle" font-family="sans-serif" font-size="56" fill="white" font-weight="bold">B</text>
          </svg>
          EOF

      # Install metainfo
      - mkdir -p /app/share/metainfo/
      - |
          cat > /app/share/metainfo/io.github.sigmasd.bandito.metainfo.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
            <id>io.github.sigmasd.bandito</id>
            <metadata_license>CC0-1.0</metadata_license>
            <project_license>MIT</project_license>
            <name>Bandito GTK</name>
            <summary>Network bandwidth monitor and traffic shaper</summary>
            <description>
              <p>
                Bandito GTK is a graphical tool for monitoring per-application network bandwidth usage
                and applying traffic shaping rules using eltrafico-tc and bandwhich as backends.
              </p>
            </description>
            <launchable type="desktop-id">io.github.sigmasd.bandito.desktop</launchable>
            <categories>
              <category>System</category>
              <category>Network</category>
            </categories>
            <content_rating type="oars-1.1"/>
            <provides>
              <binary>bandito-gtk</binary>
            </provides>
            <releases>
              <release version="2.0.1" date="2026-06-30">
                <description>
                  <p>Initial flatpak release</p>
                </description>
              </release>
            </releases>
          </component>
          EOF

    sources:
      # deno CLI (x86_64)
      - type: archive
        url: https://github.com/denoland/deno/releases/download/v2.5.1/deno-x86_64-unknown-linux-gnu.zip
        sha256: bceddde4ff520f21c3767d893fe3d2d83df788346d3ad6f03d8abcd0392eb3ab
        strip-components: 1
        only-arches:
          - x86_64
      # denort runtime (x86_64)
      - type: archive
        url: https://github.com/denoland/deno/releases/download/v2.5.1/denort-x86_64-unknown-linux-gnu.zip
        sha256: 8ea4c344bd945244186b60b2745f7cbe460f6bd8f8a7479b9dac2d57199fd298
        strip-components: 1
        only-arches:
          - x86_64
      # deno CLI (aarch64)
      - type: archive
        url: https://github.com/denoland/deno/releases/download/v2.5.1/deno-aarch64-unknown-linux-gnu.zip
        sha256: fa9822bf4fae820126b4fe3f1925010c14ca5f626f5ad743b3d6c3c20e33ad1a
        strip-components: 1
        only-arches:
          - aarch64
      # denort runtime (aarch64)
      - type: archive
        url: https://github.com/denoland/deno/releases/download/v2.5.1/denort-aarch64-unknown-linux-gnu.zip
        sha256: 772fce5bd2da44f379229bbaa7302a1e901740906f3a978c2b0f1335e00237c9
        strip-components: 1
        only-arches:
          - aarch64

      # Local source code
      - type: dir
        path: ..

      # Vendored JSR dependencies
      - deno-sources.json
